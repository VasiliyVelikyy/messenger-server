
spring.application.name=messenger-server
server.port=8080
server.shutdown=graceful

spring.websocket.enabled=true

logging.level.root=INFO
logging.level.com.yourpackage.messenger=DEBUG
logging.level.org.springframework.web.socket=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

spring.output.ansi.enabled=ALWAYS
logging.pattern.console=%clr(%d{HH:mm:ss.SSS}){faint} %clr(%-5level) %clr(%logger{36}){cyan} - %msg%n

app.websocket.endpoint=/ws
app.auth.session-timeout-minutes=30
app.message.max-length=4000

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
